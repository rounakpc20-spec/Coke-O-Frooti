<!DOCTYPE html>
<html>
<head>
<title>Wholesale Drink Distributor</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#c0392b;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:250px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.price{
color:green;
font-size:20px;
margin:10px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
Drink Wholesale Distributor
</header>

<div class="container">

<div class="card">
<h3>Coca-Cola 750ml</h3>
<p class="price">₹36 (Wholesale)</p>
<button onclick="order('Coca Cola')">Order</button>
</div>

<div class="card">
<h3>Frooti 200ml</h3>
<p class="price">₹10 (Wholesale)</p>
<button onclick="order('Frooti')">Order</button>
</div>

<div class="card">
<h3>Coca-Cola Can</h3>
<p class="price">₹28 (Wholesale)</p>
<button onclick="order('Coke Can')">Order</button>
</div>

</div>

<script>
function order(item){
alert("Order placed for: " + item);
}
</script>

</body>
</html>
